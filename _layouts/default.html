<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/lightbox.js' | relative_url }}" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="logo" href="{{ '/' | relative_url }}">🎨 Swanandee's Paradise</a>
      <nav>
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/art/' | relative_url }}" class="{% if page.url == '/art/' %}active{% endif %}">Art</a>
        <a href="{{ '/tech/' | relative_url }}" class="{% if page.url == '/tech/' %}active{% endif %}">Tech</a>
        <a href="{{ '/blog/' | relative_url }}" class="{% if page.url == '/blog/' or page.layout == 'post' %}active{% endif %}">Blog</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; {{ 'now' | date: "%Y" }} Swanandee &middot; made with 💛</p>
    </div>
  </footer>
</body>
</html>
