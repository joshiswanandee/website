---
layout: default
title: Blog
permalink: /blog/
---
<h1>📝 My Blog</h1>
<p>Thoughts, updates, and stories.</p>

<ul class="post-list">
  {% for post in site.posts %}
  <li>
    <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
    <span class="date">{{ post.date | date: "%B %-d, %Y" }}</span>
  </li>
  {% endfor %}
</ul>
