name: Build and deploy site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate art thumbnails
        run: |
          python3 <<'PYEOF'
          from PIL import Image, ImageOps
          import glob
          import os

          art_dir = "assets/images/art"
          thumb_dir = os.path.join(art_dir, "thumbs")
          os.makedirs(thumb_dir, exist_ok=True)

          patterns = ["*.jpg", "*.jpeg", "*.png", "*.webp",
                      "*.JPG", "*.JPEG", "*.PNG", "*.WEBP"]
          files = []
          for pattern in patterns:
              files.extend(glob.glob(os.path.join(art_dir, pattern)))

          def save(img, path, fmt):
              if fmt == "JPEG":
                  if img.mode != "RGB":
                      img = img.convert("RGB")
                  img.save(path, fmt, quality=80, optimize=True)
              else:
                  img.save(path, fmt, optimize=True)

          for path in files:
              name = os.path.basename(path)
              fmt = "PNG" if name.lower().endswith(".png") else "JPEG"

              original = Image.open(path)
              original = ImageOps.exif_transpose(original)

              thumb = original.copy()
              thumb.thumbnail((400, 400))
              save(thumb, os.path.join(thumb_dir, name), fmt)

              print("generated thumbnail for", name)
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
